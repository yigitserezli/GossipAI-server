services:
  postgres:
    image: postgres:16-alpine
    container_name: gossipai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./GossipAI-backend
      dockerfile: Dockerfile
    container_name: gossipai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_AGENT_MODEL: ${OPENAI_AGENT_MODEL}
      OPENAI_ASSISTANT_ID: ${OPENAI_ASSISTANT_ID}
      OPENAI_WORKFLOW_ID: ${OPENAI_WORKFLOW_ID}
      OPENAI_WORKFLOW_VERSION: ${OPENAI_WORKFLOW_VERSION}
      OPENAI_WORKFLOW_NAME: ${OPENAI_WORKFLOW_NAME}
      ADMIN_PASSCODE: ${ADMIN_PASSCODE}
      DEVELOPER_EMAILS: ${DEVELOPER_EMAILS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      EXPO_PUSH_ACCESS_TOKEN: ${EXPO_PUSH_ACCESS_TOKEN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      NOTIFICATION_SCHEDULER_ENABLED: ${NOTIFICATION_SCHEDULER_ENABLED}
      NOTIFICATION_SCHEDULER_CRON: ${NOTIFICATION_SCHEDULER_CRON}
    expose:
      - "4321"

  web:
    build:
      context: ./GossipAI-web
      dockerfile: Dockerfile
    container_name: gossipai-web
    restart: unless-stopped
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: gossipai-nginx
    restart: unless-stopped
    depends_on:
      - web
      - backend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

volumes:
  postgres_data:
