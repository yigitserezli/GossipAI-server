name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write runtime .env
        shell: bash
        run: |
          cat <<'EOF' > .env
          ${{ secrets.VPS_ENV_FILE }}
          EOF

      - name: Fix deploy path permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sudo chown -R deploy:deploy ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Upload project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: ".env,docker-compose.yml,nginx,certbot,GossipAI-backend,GossipAI-web"
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Build and restart services on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            docker compose up -d --build --remove-orphans
            docker compose exec -T backend npx prisma migrate resolve --applied 00000000000000_baseline || true
            docker compose exec -T backend npx prisma migrate deploy
            docker compose ps
